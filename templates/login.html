<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Login – DeliverX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0f0f1a;
  min-height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: #181825;
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%; max-width: 400px;
  border: 1px solid #2a2a3a;
}
.logo { text-align:center; margin-bottom: 32px; }
.logo .icon { font-size: 40px; }
.logo h1 { color:#fff; font-size:28px; font-weight:800; margin-top:8px; }
.logo h1 span { color:#ff6b35; }
.logo p { color:#666; font-size:13px; margin-top:4px; }
.tabs { display:flex; background:#0f0f1a; border-radius:12px; padding:4px; margin-bottom:28px; }
.tab {
  flex:1; text-align:center; padding:10px;
  border-radius:8px; cursor:pointer;
  color:#666; font-size:14px; font-weight:600;
  transition: all 0.2s;
}
.tab.active { background:#ff6b35; color:#fff; }
.form-group { margin-bottom: 16px; }
label { color:#aaa; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px; }
input {
  width:100%; padding:14px 16px;
  background:#0f0f1a; border:1.5px solid #2a2a3a;
  border-radius:12px; color:#fff; font-size:15px;
  outline:none; transition: border-color 0.2s;
}
input:focus { border-color:#ff6b35; }
input::placeholder { color:#444; }
.btn {
  width:100%; padding:15px;
  background:linear-gradient(135deg,#ff6b35,#ff9500);
  color:#fff; border:none; border-radius:12px;
  font-size:16px; font-weight:700; cursor:pointer;
  margin-top:8px; transition: opacity 0.2s;
  letter-spacing:0.5px;
}
.btn:active { opacity:0.85; }
.error { color:#ff4757; font-size:13px; text-align:center; margin-top:12px; display:none; }
</style>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#ff6b35">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">📦</div>
    <h1>Deliver<span>X</span></h1>
    <p>Smart Route Delivery Platform</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login')">Login</div>
    <div class="tab" onclick="showTab('signup')">Sign Up</div>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="lPass" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doLogin()">Login →</button>
    <p class="error" id="lErr"></p>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="sName" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="sPhone" placeholder="+91 XXXXX XXXXXX">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="sEmail" placeholder="Janedoe@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="sPass" placeholder="Create password">
    </div>
    <button class="btn" onclick="doSignup()">Create Account →</button>
    <p class="error" id="sErr"></p>
  </div>
</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='signup'&&i===1)));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
}

async function doLogin() {
  const email = document.getElementById('lEmail').value;
  const password = document.getElementById('lPass').value;
  if (!email || !password) { showErr('lErr','Fill all fields'); return; }
  const res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const data = await res.json();
  if (data.success) window.location.href='/dashboard';
  else showErr('lErr', data.message);
}

async function doSignup() {
  const name=document.getElementById('sName').value;
  const phone=document.getElementById('sPhone').value;
  const email=document.getElementById('sEmail').value;
  const password=document.getElementById('sPass').value;
  if (!name||!email||!password) { showErr('sErr','Fill all fields'); return; }
  const res = await fetch('/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,email,password})});
  const data = await res.json();
  if (data.success) window.location.href='/dashboard';
  else showErr('sErr', data.message);
}

function showErr(id,msg) {
  const el=document.getElementById(id);
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',3000);
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key==='Enter') {
    if (document.getElementById('loginForm').style.display!=='none') doLogin();
    else doSignup();
  }
});
</script>
<div style="text-align:center;color:#444;font-size:12px;padding:16px 0 4px">Made with ❤️ in India 🇮🇳</div>
</body>
</html>
